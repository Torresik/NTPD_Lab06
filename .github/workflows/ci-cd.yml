name: ML CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Zadanie 2: Testowanie kodu
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie kodu repozytorium
        uses: actions/checkout@v3

      - name: Konfiguracja Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalacja zaleznosci
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Uruchomienie testow jednostkowych
        run: pytest test_model.py

  # Zadanie 3: Budowanie Dockera i publikacja (wykonuje sie po przejsciu testow)
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Pobranie kodu repozytorium
        uses: actions/checkout@v3

      - name: Logowanie do GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Budowanie i wysylanie obrazu Dockera
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/torresik/ntpd_lab06/ml-api:latest